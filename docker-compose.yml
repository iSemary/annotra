# Local PostgreSQL — matches backend/.env.example (user/db/password: annotra).
# Host port 15432 avoids clashing with local PostgreSQL on 5432/5433.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: annotra
      POSTGRES_PASSWORD: annotra
      POSTGRES_DB: annotra
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U annotra -d annotra"]
      interval: 2s
      timeout: 5s
      retries: 15
